name: Build Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            python -m pip install -r requirements.txt
          } else {
            Write-Host "requirements.txt not found - skipping"
          }
          python -m pip install pyinstaller

      - name: Debug - list repo files
        shell: pwsh
        run: |
          Write-Host "Repo root files:"
          Get-ChildItem -Force
          Write-Host "`nLooking for overlay_app_locker.py:"
          Get-ChildItem -Recurse -Filter "overlay_app_locker.py" | Select-Object FullName

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name "OverlayAppLocker" overlay_app_locker.py

      - name: Debug - list dist outputs
        shell: pwsh
        run: |
          Write-Host "Contents of dist/:"
          if (Test-Path "dist") { Get-ChildItem -Recurse "dist" } else { Write-Host "dist folder not found" }

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OverlayAppLocker-Executable
          path: dist/**
          if-no-files-found: error