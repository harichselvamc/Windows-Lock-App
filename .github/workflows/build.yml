name: Build & Auto-Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # required to push tags + create releases

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build_release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to create/push tags reliably

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") { python -m pip install -r requirements.txt }
          python -m pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name "OverlayAppLocker" overlay_app_locker.py

      # Auto version: v1.0.<run_number>
      - name: Set version
        id: ver
        shell: pwsh
        run: |
          $version = "v1.0.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Create and push tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $tag = "${{ steps.ver.outputs.version }}"

          # If tag already exists remotely, skip tagging (prevents failures on reruns)
          git fetch --tags
          $exists = git tag -l $tag
          if ($exists) {
            Write-Host "Tag $tag already exists. Skipping tag creation."
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/OverlayAppLocker.exe